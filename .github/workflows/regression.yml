name: Regression Tests

on:
  push:
    branches:
      - main
      - master
    paths:
      - "src/**"
      - "include/**"
      - "tests/**"
      - "CMakeLists.txt"
      - "Makefile"
      - ".github/workflows/regression.yml"
  pull_request:
    paths:
      - "src/**"
      - "include/**"
      - "tests/**"
      - "CMakeLists.txt"
      - "Makefile"
      - ".github/workflows/regression.yml"
  workflow_dispatch:

jobs:
  cmake-regression:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DBUILD_SANDBOX=OFF -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Run Regression Tests
        run: ./build/bin/physics_tests

  make-regression:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build And Run Make Tests
        run: make test
